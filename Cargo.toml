[package]
name = "vm-convert"
version = "0.1.0"
edition = "2021"
description = "Convert VMware OVF/VMDK images to QEMU/KVM (libvirt) format"
authors = ["vm-convert contributors"]

[[bin]]
name = "vm-convert"
path = "src/main.rs"

[dependencies]
clap     = { version = "4",    features = ["derive"] }
anyhow   = "1"
thiserror = "1"
roxmltree = "0.20"
indicatif = "0.17"
which    = "6"

[dev-dependencies]
tempfile = "3"
